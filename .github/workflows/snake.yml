name: Generate Profile Animations

on:
  schedule:
    - cron: "0 0 * * *" # runs once every day
  workflow_dispatch: {} # allows manual run from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate snake animation SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ashishmauryapoma
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Generate static 3D contribution graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ashishmauryapoma

      - name: Move 3D graph into dist folder
        run: |
          sudo mkdir -p dist/profile-3d-contrib
          sudo cp profile-3d-contrib/*.svg dist/profile-3d-contrib/
          sudo chown -R $USER:$USER dist

      - name: Push everything to "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
