name: Generate Profile Animations

on:
  schedule:
    - cron: "0 0 * * *" # runs once every day
  workflow_dispatch: {} # allows manual run from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate snake animation SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ashishmauryapoma
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests matplotlib pillow numpy

      - name: Generate rotating 3D contribution GIF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ashishmauryapoma
        run: |
          python generate_3d_gif.py
          mv profile-3d-contrib.gif dist/

      - name: Push everything to "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
